<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha • Shopee Commissions Analyzer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2c2f, #0a1f22);
    }

    .card {
      background: #0b0b0b;
      width: 100%;
      max-width: 400px;
      padding: 40px 35px;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      text-align: center;
    }

    h1 {
      color: #ffffff;
      font-size: 24px;
      margin-bottom: 5px;
    }

    h1 span {
      color: #34d399;
    }

    .subtitle {
      color: #a1a1aa;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 15px;
      position: relative;
    }

    input {
      width: 100%;
      padding: 12px 40px 12px 12px;
      border-radius: 8px;
      border: none;
      background: #1f1f1f;
      color: #fff;
      font-size: 14px;
    }

    input::placeholder {
      color: #6b7280;
    }

    .toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 14px;
      color: #9ca3af;
    }

    .strength-bar {
      width: 100%;
      height: 6px;
      border-radius: 5px;
      background: #1f1f1f;
      margin-top: 8px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: 0.3s ease;
    }

    .strength-text {
      font-size: 12px;
      margin-top: 5px;
      text-align: left;
    }

    button {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: #34d399;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s ease;
    }

    button:hover {
      background: #10b981;
    }

    .message {
      margin-top: 15px;
      font-size: 13px;
    }

    .error {
      color: #ef4444;
    }

    .success {
      color: #22c55e;
    }

    .secure {
      margin-top: 20px;
      font-size: 12px;
      color: #9ca3af;
    }

    .input-wrapper {
  position: relative;
}

.input-wrapper input {
  width: 100%;
  padding: 12px 40px 12px 12px;
}

.input-wrapper .toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 14px;
  color: #9ca3af;
}

  </style>
</head>
<body>

  <div class="card">

    <h1>Shopee <span>Commissions</span> Analyzer</h1>
    <p class="subtitle">Crie sua senha para acessar o painel</p>

<div class="input-group">

  <div class="input-wrapper">
    <input type="password" id="password" placeholder="Nova senha" oninput="checkStrength()">
    <span class="toggle" onclick="togglePassword('password')">👁</span>
  </div>

  <div class="strength-bar">
    <div class="strength-fill" id="strengthFill"></div>
  </div>
  <div class="strength-text" id="strengthText"></div>

</div>


    <div class="input-group">
      <input type="password" id="confirmPassword" placeholder="Confirmar senha">
      <span class="toggle" onclick="togglePassword('confirmPassword')">👁</span>
    </div>

    <button onclick="updatePassword()">Salvar nova senha</button>

    <div class="message" id="message"></div>

    <div class="secure">
      🔒 Acesso seguro • Dados protegidos
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://miudgbuwxwvszdunlifw.supabase.co"
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pdWRnYnV3eHd2c3pkdW5saWZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1NTMxODUsImV4cCI6MjA4NTEyOTE4NX0.WtelQveBTVlhR0BLb6ke9xb2i0a3ocfsPjKDupR1KRM"


    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) {
        document.getElementById("message").innerHTML =
          "<span class='error'>Link inválido ou expirado.</span>";
      }
    }

    checkSession();

    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }

    function checkStrength() {
      const password = document.getElementById("password").value;
      const fill = document.getElementById("strengthFill");
      const text = document.getElementById("strengthText");

      let strength = 0;

      if (password.length >= 6) strength++;
      if (password.match(/[A-Z]/)) strength++;
      if (password.match(/[0-9]/)) strength++;
      if (password.match(/[^A-Za-z0-9]/)) strength++;

      let width = (strength / 4) * 100;
      fill.style.width = width + "%";

      if (strength <= 1) {
        fill.style.background = "#ef4444";
        text.innerHTML = "<span style='color:#ef4444'>Senha fraca</span>";
      } else if (strength === 2) {
        fill.style.background = "#f59e0b";
        text.innerHTML = "<span style='color:#f59e0b'>Senha média</span>";
      } else if (strength === 3) {
        fill.style.background = "#3b82f6";
        text.innerHTML = "<span style='color:#3b82f6'>Senha forte</span>";
      } else {
        fill.style.background = "#22c55e";
        text.innerHTML = "<span style='color:#22c55e'>Senha muito forte</span>";
      }
    }

    async function updatePassword() {
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const message = document.getElementById("message");

      if (password.length < 6) {
        message.innerHTML = "<span class='error'>A senha deve ter no mínimo 6 caracteres.</span>";
        return;
      }

      if (password !== confirmPassword) {
        message.innerHTML = "<span class='error'>As senhas não coincidem.</span>";
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({
        password: password
      });

      if (error) {
        message.innerHTML = "<span class='error'>" + error.message + "</span>";
      } else {
        message.innerHTML =
          "<span class='success'>Senha criada com sucesso! Redirecionando...</span>";

        setTimeout(async() => {
          await supabaseClient.auth.signOut();
          window.location.href = "index.html";
        }, 1500);
      }
    }
  </script>

</body>
</html>
